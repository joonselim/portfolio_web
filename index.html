<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1600" />
  <title>Joonse Lim — Portfolio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="config.js"></script>

  <style>
    /* ─── Design Tokens ─────────────────────────────────────────── */
    :root {
      /* Colors */
      --navy:         #012169;
      --navy-700:     #0a2a7a;
      --navy-500:     #2a46a0;
      --ink:          #0A1428;
      --ink-2:        #1E293B;
      --muted:        #64748B;
      --mute-2:       #94A3B8;
      --paper:        #FFFFFF;
      --fog:          #F5F7FB;
      --fog-2:        #EDF1F7;
      --rule:         #E3E8F0;
      --rule-strong:  #C8D1DE;
      --accent:       #2563eb;

      /* Fonts */
      --sans:     "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --serif:    "Newsreader", "Iowan Old Style", "Apple Garamond", Georgia, serif;
      --mono:     "JetBrains Mono", ui-monospace, Menlo, monospace;
      --pf:       var(--sans);
      --pf-serif: var(--serif);
    }

    /* ─── Reset ─────────────────────────────────────────────────── */
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #0a0f1d;
      color: var(--ink);
      font-family: var(--pf);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ─── Stage ──────────────────────────────────────────────────── */
    #stage-wrap {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #0a0f1d;
    }

    #stage {
      width: 1600px;
      height: 900px;
      background: var(--paper);
      position: absolute;
      top: 0;
      left: 0;
      transform-origin: top left;
      overflow: hidden;
      box-shadow: 0 40px 120px rgba(0, 0, 0, .5);
      outline: 1px solid rgba(255, 255, 255, .05);
    }

    /* ─── Pages ──────────────────────────────────────────────────── */
    .page {
      position: absolute;
      inset: 0;
      padding: 72px 88px;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .page.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      /* Click anywhere on the page (outside the interactive zones below)
         to advance to the next slide. */
      cursor: e-resize;
    }
    /* But keep the default cursor / interaction over chatbot, iframes,
       links, buttons, form inputs, the tweaks panel, and any opt-out. */
    .page.active a,
    .page.active button,
    .page.active input,
    .page.active textarea,
    .page.active select,
    .page.active label,
    .page.active iframe,
    .page.active .chat-panel,
    .page.active .twk-panel,
    .page.active [data-no-nav] {
      cursor: auto;
    }

    /* ─── Page Transitions ───────────────────────────────────────── */
    .anim-fade .page {
      transition: opacity .4s ease;
    }

    .anim-slide .page {
      transform: translateX(40px);
      transition: opacity .5s cubic-bezier(.22, .61, .36, 1),
                  transform .5s cubic-bezier(.22, .61, .36, 1);
    }
    .anim-slide .page.active  { transform: translateX(0); }
    .anim-slide .page.leaving { transform: translateX(-40px); opacity: 0; }

    .anim-reveal .page {
      clip-path: inset(0 100% 0 0);
      transition: clip-path .7s cubic-bezier(.76, 0, .24, 1),
                  opacity .3s ease;
    }
    .anim-reveal .page.active { clip-path: inset(0 0 0 0); }

    .anim-none .page { transition: none; }

    /* ─── Typography ─────────────────────────────────────────────── */
    .eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--navy);
      font-weight: 500;
    }
    .eyebrow.muted { color: var(--muted); }

    h1, h2, h3, h4 {
      margin: 0;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--ink);
    }

    .display { font-size: 104px; line-height: .95;   letter-spacing: -.04em;  font-weight: 600; }
    .h1      { font-size: 64px;  line-height: 1.02;  letter-spacing: -.03em;  font-weight: 600; }
    .h2      { font-size: 44px;  line-height: 1.08;  letter-spacing: -.025em; font-weight: 600; }
    .h3      { font-size: 28px;  line-height: 1.15;  letter-spacing: -.015em; font-weight: 600; }
    .h4      { font-size: 18px;  line-height: 1.3;   font-weight: 600; }

    .body    { font-size: 16px; line-height: 1.55; color: var(--ink-2); }
    .body-lg { font-size: 19px; line-height: 1.55; color: var(--ink-2); }
    .small   { font-size: 13px; line-height: 1.5;  color: var(--muted); }

    .mono  { font-family: var(--mono); }
    .serif { font-family: var(--pf-serif); }
    .navy  { color: var(--navy); }
    .muted { color: var(--muted); }

    /* ─── Page Chrome ────────────────────────────────────────────── */
    .page-mark {
      position: absolute;
      top: 36px;
      left: 88px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .page-mark .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--navy);
    }

    .page-num {
      position: absolute;
      top: 36px;
      right: 88px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .18em;
      color: var(--muted);
    }

    /* ─── Timeline Nav ───────────────────────────────────────────── */
    #timeline {
      position: absolute;
      bottom: 28px;
      left: 240px;            /* sits next to .kbd-hint which ends ~225px in */
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      z-index: 50;
    }

    .tl-item {
      display: flex;
      flex-direction: column-reverse;  /* label appears above bar */
      align-items: center;
      gap: 4px;
      cursor: pointer;
      background: transparent;
      border: 0;
      padding: 0;
      font-family: var(--mono);
      color: var(--mute-2);
      font-size: 13px;
      letter-spacing: .12em;
    }
    .tl-item .bar {
      width: 3px;
      height: 18px;
      background: var(--rule-strong);
      transition: all .25s ease;
    }
    .tl-item:hover .bar { background: var(--navy); height: 22px; }
    .tl-item.on    .bar { background: var(--navy); height: 28px; }

    .tl-item .lbl {
      opacity: 0;
      transition: all .2s ease;
      white-space: nowrap;
      text-transform: uppercase;
      pointer-events: none;
      font-size: 12.5px;
      position: absolute;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%) translateY(2px);
    }
    .tl-item { position: relative; }
    .tl-item:hover .lbl,
    .tl-item.on    .lbl {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      color: var(--navy);
    }

    /* ─── Keyboard Hint ──────────────────────────────────────────── */
    .kbd-hint {
      position: absolute;
      bottom: 28px;
      left: 88px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--mute-2);
    }
    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      padding: 0 6px;
      border: 1px solid var(--rule);
      border-bottom-width: 2px;
      border-radius: 4px;
      background: #fff;
      color: var(--ink-2);
      font-family: var(--mono);
      font-size: 11px;
    }

    /* First-page glow — make the arrow keys beat softly so visitors notice
       they can use ← → to navigate. Only applied while on idx 0. */
    .kbd-hint--first {
      color: var(--navy);
      font-weight: 600;
      font-size: 11px;
    }
    .kbd-hint--first .kbd {
      border-color: var(--navy);
      color: var(--navy);
      animation: kbdGlow 1.6s ease-in-out infinite;
    }
    .kbd-hint--first .kbd:nth-child(2) {
      animation-delay: 0.4s;
    }
    @keyframes kbdGlow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(1, 33, 105, 0.0),
                    0 1px 0 var(--rule);
        transform: translateY(0);
      }
      50% {
        box-shadow: 0 0 0 4px rgba(1, 33, 105, 0.18),
                    0 0 14px 2px rgba(1, 33, 105, 0.35),
                    0 1px 0 var(--rule);
        transform: translateY(-1px);
      }
    }

    /* ─── Reusable Components ────────────────────────────────────── */
    .rule  { height: 1px; background: var(--rule); width: 100%; }
    .vrule { width: 1px;  background: var(--rule); align-self: stretch; }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-2);
      background: #fff;
    }
    .chip.navy { background: var(--navy); color: #fff; border-color: var(--navy); }
    .chip.soft {
      background: var(--fog);
      border-color: transparent;
      color: var(--navy);
      text-transform: none;
      letter-spacing: 0;
      font-family: var(--pf);
      font-size: 12.5px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .placeholder {
      background:
        repeating-linear-gradient(135deg, rgba(1, 33, 105, .06) 0 1px, transparent 1px 8px),
        var(--fog);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .14em;
      text-transform: uppercase;
      border: 1px solid var(--rule);
    }

    /* ─── Page 1 — Chatbot ───────────────────────────────────────── */
    .chat-wrap {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 56px;
      height: 100%;
    }
    .chat-left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .chat-panel {
      background: var(--fog);
      border: 1px solid var(--rule);
      border-radius: 18px;
      padding: 26px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .chat-panel .hd {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--rule);
    }
    .chat-panel .hd .av {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .02em;
    }
    .chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 18px 2px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }
    .bubble {
      max-width: 86%;
      padding: 11px 14px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bubble.bot {
      background: #fff;
      border: 1px solid var(--rule);
      color: var(--ink-2);
      align-self: flex-start;
      border-top-left-radius: 4px;
    }
    .bubble.user {
      background: var(--navy);
      color: #fff;
      align-self: flex-end;
      border-top-right-radius: 4px;
    }
    .bubble.typing {
      background: #fff;
      border: 1px solid var(--rule);
      align-self: flex-start;
      display: inline-flex;
      gap: 4px;
      padding: 14px;
    }
    .bubble.typing i {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--mute-2);
      display: block;
      animation: tp 1.2s infinite;
    }
    .bubble.typing i:nth-child(2) { animation-delay: .15s; }
    .bubble.typing i:nth-child(3) { animation-delay: .3s; }

    @keyframes tp {
      0%, 60%, 100% { transform: translateY(0);    opacity: .4; }
      30%            { transform: translateY(-4px); opacity: 1; }
    }

    .chat-input {
      display: flex;
      gap: 8px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
    }
    .chat-input input {
      flex: 1;
      height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid var(--rule);
      background: #fff;
      font: inherit;
      font-size: 14px;
      outline: none;
      color: var(--ink);
    }
    .chat-input input:focus { border-color: var(--navy); }
    .chat-input button {
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      border: 0;
      background: var(--navy);
      color: #fff;
      font-weight: 500;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: .01em;
    }
    .chat-input button:disabled { opacity: .5; }

    .sugs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .sug {
      padding: 7px 12px;
      background: #fff;
      border: 1px solid var(--rule);
      border-radius: 999px;
      font-size: 12.5px;
      color: var(--ink-2);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .sug:hover { border-color: var(--navy); color: var(--navy); background: #fff; }

    /* ─── Page 2 — Title ─────────────────────────────────────────── */
    .title-page {
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      position: relative;
    }
    .big-name {
      font-size: 180px;
      line-height: .88;
      letter-spacing: -.05em;
      font-weight: 600;
      color: var(--ink);
    }
    .big-name .amp {
      color: var(--navy);
      font-family: var(--pf-serif);
      font-style: italic;
      font-weight: 400;
    }

    /* ─── Page 3 — About ─────────────────────────────────────────── */
    .about-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 80px;
      height: 100%;
      align-items: center;
    }
    .avatar-ph {
      width: 360px;
      height: 460px;
      border-radius: 4px;
      background:
        repeating-linear-gradient(135deg, rgba(1, 33, 105, .08) 0 1px, transparent 1px 10px),
        var(--fog);
    }

    /* ─── Page 4 — Education ─────────────────────────────────────── */
    .edu-card {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 36px 40px;
      background: #fff;
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 32px;
      align-items: start;
    }
    .edu-card .crest {
      width: 54px;
      height: 54px;
      border-radius: 6px;
      background: var(--navy);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--pf-serif);
      font-style: italic;
      font-size: 26px;
      font-weight: 500;
    }
    .edu-card.alt .crest { background: #9a1f1f; }

    /* ─── Page 5 — Experience ────────────────────────────────────── */
    .tl-row {
      display: grid;
      grid-template-columns: 120px 1fr 180px;
      gap: 40px;
      padding: 22px 0;
      border-top: 1px solid var(--rule);
      align-items: center;
    }
    .tl-row:last-child { border-bottom: 1px solid var(--rule); }

    .tl-row .yr  { font-family: var(--mono); font-size: 13px;   color: var(--navy);  letter-spacing: .04em; }
    .tl-row .co  { font-size: 22px;          font-weight: 600;  color: var(--ink);   letter-spacing: -.01em; }
    .tl-row .ro  { font-size: 13.5px; color: var(--muted); margin-top: 3px; }
    .tl-row .loc { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; letter-spacing: .1em; text-transform: uppercase; }

    /* ─── Page 6 — Shinhan ───────────────────────────────────────── */
    .shinhan {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 52px;
      height: 100%;
    }
    .metric-card {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 22px;
      background: #fff;
    }
    .metric-card .v {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -.03em;
      color: var(--navy);
      line-height: 1;
      font-feature-settings: "tnum";
    }
    .metric-card .v .unit { font-size: 20px; color: var(--navy); font-weight: 500; }
    .metric-card .k       { font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.4; }

    .bullet {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px dashed var(--rule);
      font-size: 14.5px;
      line-height: 1.55;
      color: var(--ink-2);
    }
    .bullet:last-child { border-bottom: 0; }
    .bullet .n {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--navy);
      letter-spacing: .08em;
      padding-top: 3px;
    }

    /* ─── Page 9 — Projects ──────────────────────────────────────── */
    .proj-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: 20px;
      height: calc(100% - 180px);
    }
    .proj {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 22px 22px 20px;
      background: #fff;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      position: relative;
      transition: border-color .2s, transform .2s;
    }
    .proj:hover { border-color: var(--navy); transform: translateY(-2px); }

    .proj .idx  { position: absolute; top: 18px; right: 22px; font-family: var(--mono); font-size: 10.5px; color: var(--mute-2); letter-spacing: .1em; }
    .proj h4    { font-size: 19px; margin-top: 6px; padding-right: 30px; }
    .proj .desc { font-size: 13.5px; color: var(--muted); line-height: 1.5; flex: 1; }
    .proj .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .proj .tags span {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--navy);
      border: 1px solid var(--rule);
      padding: 3px 7px;
      border-radius: 4px;
      letter-spacing: .05em;
      text-transform: uppercase;
    }
    .proj .viz { height: 70px; border-radius: 4px; background: var(--fog); margin-top: 2px; }

    /* ─── Page 10 — Skills ───────────────────────────────────────── */
    .skill-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 28px 40px;
    }
    .skill-col h4 {
      font-size: 12px;
      font-family: var(--mono);
      color: var(--navy);
      letter-spacing: .16em;
      text-transform: uppercase;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--rule);
      margin-bottom: 12px;
    }
    .skill-col ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .skill-col li {
      font-size: 14px;
      color: var(--ink-2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .skill-col li .dots   { display: flex; gap: 3px; }
    .skill-col li .dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--rule-strong); display: block; }
    .skill-col li .dots i.on { background: var(--navy); }

    /* ─── Page 11 — Awards ───────────────────────────────────────── */
    .heat {
      display: grid;
      grid-template-columns: repeat(26, 1fr);
      gap: 3px;
    }
    .heat i    { aspect-ratio: 1/1; border-radius: 2px; background: var(--fog-2); }
    .heat i.l1 { background: #cbd7ec; }
    .heat i.l2 { background: #8ba3d2; }
    .heat i.l3 { background: #3b5ca8; }
    .heat i.l4 { background: var(--navy); }

    /* ─── Page 12 — Contact ──────────────────────────────────────── */
    .contact-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 24px;
      padding: 18px 0;
      border-top: 1px solid var(--rule);

    @page {
      size: 1600px 900px;
      margin: 0;

    @media print {
      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background: #fff !important;

        transform: none !important;
        width: auto !important;
        height: auto !important;
        background: none !important;
        box-shadow: none !important;
        outline: none !important;
        overflow: visible !important;
        inset: auto !important;

      .twk-panel,

      *, *::before, *::after {

  <!-- Scale stage to viewport -->
  <script>
    (function () {
      const stage = document.getElementById('stage');
      function fit() {
        const sx = window.innerWidth  / 1600;
        const sy = window.innerHeight / 900;
        const s  = Math.min(sx, sy);
        const dx = (window.innerWidth  - 1600 * s) / 2;
        const dy = (window.innerHeight - 900  * s) / 2;
        stage.style.transform = `translate(${dx}px, ${dy}px) scale(${s})`;
      }
      window.addEventListener('resize', fit);
      fit();
    })();

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((key, val) => {
    setValues((prev) => ({ ...prev, [key]: val }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,

});

// Animated number counter: ticks through random digits, then settles to target
function Counter({to, duration=1400, suffix="", prefix="", decimals=0}) {
  const [v, setV] = React.useState(0);
  React.useEffect(() => {
    let raf, start;
    const steps = 18;
    let step = 0;
    const tickId = setInterval(() => {
      step++;
      const rand = Math.random() * to * 1.3;
      setV(rand);
      if (step >= steps) {
        clearInterval(tickId);
        start = performance.now();
        const animate = (t) => {
          const p = Math.min(1, (t - start)/500);
          const eased = 1 - Math.pow(1-p, 3);
          setV(to * eased);
          if (p < 1) raf = requestAnimationFrame(animate);
          else setV(to);
        };
        raf = requestAnimationFrame(animate);
      }
    }, duration/steps);
    return () => { clearInterval(tickId); if (raf) cancelAnimationFrame(raf); };
  }, [to]);
  const display = decimals > 0 ? v.toFixed(decimals) : Math.round(v).toString();
  return <span style={{fontVariantNumeric:"tabular-nums"}}>{prefix}{display}{suffix}</span>;
}

  <!-- ─── app.jsx ─────────────────────────────────────────────────── -->
  <script type="text/babel">
// app.jsx — main app shell, keyboard nav, timeline, tweaks

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryFont": "sans",
  "transition": "fade"
}/*EDITMODE-END*/;

const PAGES = [
  { key:"chat",    label:"Title",      Cmp: () => <Chatbot /> },
  { key:"about",   label:"About",      Cmp: PageAbout },
  { key:"shinhan", label:"Shinhan",    Cmp: PageShinhan },
  { key:"startup", label:"Founder",    Cmp: PageStartup },
  { key:"forcs",   label:"FORCS",      Cmp: PageForcs },
  { key:"audible", label:"Audible",    Cmp: PageAudible },
  { key:"shis",    label:"SHIS",       Cmp: PageShis },
  { key:"phone",   label:"Phone Agent",Cmp: PagePhoneAgent },
  { key:"daisy",   label:"Daisy NYC",  Cmp: PageDaisy },
  { key:"mario",   label:"Mario RL",   Cmp: PageMario },
  { key:"proj",    label:"Shipped+Skills", Cmp: PageProjects },
  { key:"contact", label:"Contact",    Cmp: PageContact },
];

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [idx, setIdx] = React.useState(() => {
    const h = parseInt((location.hash||"").replace("#",""), 10);
    return Number.isFinite(h) && h>=0 && h<PAGES.length ? h : 0;
  });
  const [leavingIdx, setLeavingIdx] = React.useState(null);

  // Apply font tweak
  React.useEffect(() => {
    const root = document.documentElement;
    if (t.primaryFont === "serif") {
      root.style.setProperty("--pf", "var(--serif)");
    } else {
      root.style.setProperty("--pf", "var(--sans)");
    }
  }, [t.primaryFont]);

  // Apply transition tweak
  React.useEffect(() => {
    const stage = document.getElementById("stage");
    if (!stage) return;
    stage.classList.remove("anim-fade","anim-slide","anim-reveal","anim-none");
    stage.classList.add(`anim-${t.transition || "fade"}`);
  }, [t.transition]);

  // Keyboard nav
  React.useEffect(() => {
    const onKey = (e) => {
      const tag = (document.activeElement?.tagName || "").toLowerCase();
      const isArrow = e.key === "ArrowRight" || e.key === "ArrowLeft" || e.key === "PageDown" || e.key === "PageUp" || e.key === "Home" || e.key === "End";
      if ((tag === "input" || tag === "textarea") && !isArrow) return;
      if (e.key === "ArrowRight" || e.key === "PageDown") { e.preventDefault(); go(idx+1); }
      else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); go(idx-1); }
      else if (e.key === "Home") { e.preventDefault(); go(0); }
      else if (e.key === "End")  { e.preventDefault(); go(PAGES.length-1); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [idx]);

  React.useEffect(() => {
    history.replaceState(null, "", "#"+idx);
    window.parent?.postMessage({ slideIndexChanged: idx }, "*");
  }, [idx]);

  const go = (n) => {
    const next = Math.max(0, Math.min(PAGES.length-1, n));
    if (next === idx) return;
    setLeavingIdx(idx);
    setIdx(next);
    setTimeout(() => setLeavingIdx(null), 700);
  };

  // Click anywhere on the active page to advance, EXCEPT inside
  // interactive zones (chatbot, iframes, links, buttons, inputs, the
  // tweaks panel, or anything explicitly opted out with data-no-nav).
  const onPageClick = (i) => (e) => {
    if (i !== idx) return;                   // only the active page navigates
    const blocked = e.target.closest(
      'a, button, input, textarea, select, label, iframe, ' +
      '.chat-panel, .twk-panel, [data-no-nav]'
    );
    if (blocked) return;
    // Don't advance while the user is selecting/highlighting text.
    const sel = typeof window !== "undefined" && window.getSelection
      ? window.getSelection() : null;
    if (sel && sel.toString().length > 0) return;
    go(idx + 1);
  };

  return (
    <>
      {PAGES.map((p,i) => {
        const active = i === idx;
        const leaving = i === leavingIdx;
        return (
          <div key={p.key}
               className={`page${active?" active":""}${leaving?" leaving":""}`}
               data-screen-label={`${String(i+1).padStart(2,'0')} ${p.label}`}
               onClick={onPageClick(i)}>
            <p.Cmp />
          </div>
        );
      })}

      {/* Right timeline */}
      <div id="timeline">
        {PAGES.map((p,i)=>(
          <button key={p.key} className={`tl-item${i===idx?" on":""}`} onClick={()=>go(i)} title={p.label}>
            <span className="lbl">{String(i+1).padStart(2,'0')} · {p.label}</span>
            <span className="bar"></span>
          </button>
        ))}
      </div>

      {/* Keyboard hint — glows on the very first page so visitors notice */}
      <div className={`kbd-hint${idx === 0 ? " kbd-hint--first" : ""}`}>
        <span className="kbd">←</span><span className="kbd">→</span><span>navigate</span>
      </div>

      <TweaksPanel>
        <TweakSection label="Typography" />
        <TweakRadio
          label="Primary font"
          value={t.primaryFont}
          options={["sans","serif"]}
          onChange={(v)=>setTweak("primaryFont", v)}
        />
        <TweakSection label="Page transition" />
        <TweakRadio
          label="Animation"
          value={t.transition}
          options={["fade","slide","reveal","none"]}
          onChange={(v)=>setTweak("transition", v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
